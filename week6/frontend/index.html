<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <div class="toolbar">
          <input id="note-search" placeholder="Search notes" />
          <select id="note-sort"><option value="created_desc">Newest first</option><option value="title_asc">Title A–Z</option></select>
          <span id="note-count"></span>
        </div>
        <ul id="notes"></ul>
        <div class="pager"><button id="notes-prev">Previous</button><span id="notes-page"></span><button id="notes-next">Next</button></div>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        <div class="toolbar">
          <select id="action-filter"><option value="">All</option><option value="false">Open</option><option value="true">Completed</option></select>
          <button id="bulk-complete">Complete selected</button><span id="action-count"></span>
        </div>
        <ul id="actions"></ul>
        <div class="pager"><button id="actions-prev">Previous</button><span id="actions-page"></span><button id="actions-next">Next</button></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
